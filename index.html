<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="utf-8"/>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<title>Maison B – Vide maison &amp; nettoyage à Liège et alentours</title>

<style>

:root {

  --blue:#123f7e;

  --blue2:#1d63c9;

  --blue3:#0f3972;

  --dark:#0b1f3b;

  --light:#f4f8ff;

  --white:#ffffff;

  --text:#1f2b38;

  --muted:#5c6978;

  --border:#dbe6f4;

  --shadow:0 18px 42px rgba(16,58,116,.11);

  --radius:24px;

  --max:1220px;

}

*{box-sizing:border-box}

html{scroll-behavior:smooth}

body{

  margin:0;

  font-family:Arial, Helvetica, sans-serif;

  color:var(--text);

  background:linear-gradient(180deg,#fbfdff 0%,#f2f7ff 100%);

  line-height:1.55;

}

img{display:block;max-width:100%}

a{text-decoration:none;color:inherit}

.container{max-width:var(--max);margin:auto;padding:0 22px}

.topbar{

  background:#0a254d;color:#fff;font-size:14px;border-bottom:1px solid rgba(255,255,255,.12)

}

.topbar .container{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:10px 22px}

.hero{

  position:relative;color:#fff;overflow:hidden;

  background:

    linear-gradient(rgba(11,31,59,.72), rgba(18,63,126,.78)),

    url('images/836EBAE0-C4A1-40B8-8368-9B8B62971846.jpeg') center/cover no-repeat;

}

.hero::after{

  content:"";position:absolute;inset:0;

  background:radial-gradient(circle at 85% 15%, rgba(255,255,255,.18), transparent 24%);

}

.hero-inner{

  position:relative;z-index:1;

  padding:84px 0 74px;

  display:grid;grid-template-columns:1.12fr .88fr;gap:28px;align-items:center;

}

.badge{

  display:inline-block;padding:10px 14px;border-radius:999px;

  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.24);

  font-size:13px;margin-bottom:18px

}

h1,h2,h3{margin:0 0 14px;line-height:1.12}

h1{font-size:66px;letter-spacing:-1.5px}

h2{font-size:36px;color:var(--blue3)}

h3{font-size:23px;color:var(--blue3)}

.kicker{font-size:26px;font-weight:700;margin-bottom:10px}

.aaz{

  display:inline-block;

  font-size:34px;font-weight:800;letter-spacing:.3px;

  background:#fff;color:var(--blue3);border-radius:18px;padding:16px 22px;

  box-shadow:0 14px 28px rgba(0,0,0,.18);margin:14px 0 16px;

}

.lead{font-size:19px;max-width:760px;margin:0 0 10px;color:rgba(255,255,255,.97)}

.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:24px}

.btn{

  display:inline-flex;align-items:center;justify-content:center;padding:16px 24px;border-radius:14px;

  font-weight:700;border:2px solid transparent;transition:.18s ease;cursor:pointer;

}

.btn:hover{transform:translateY(-1px)}

.btn-primary{background:#fff;color:var(--blue3);box-shadow:0 10px 22px rgba(0,0,0,.16)}

.btn-secondary{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.58);color:#fff}

.hero-card{

  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:28px;

  padding:28px;backdrop-filter:blur(5px);box-shadow:var(--shadow);

}

.hero-card h3{color:#fff}

.hero-list{list-style:none;padding:0;margin:0}

.hero-list li{padding:10px 0 10px 28px;position:relative;border-bottom:1px solid rgba(255,255,255,.13)}

.hero-list li:last-child{border-bottom:none}

.hero-list li:before{content:"✓";position:absolute;left:0;top:10px;font-weight:700}

section{padding:72px 0}

.section-light{background:linear-gradient(180deg,#f8fbff 0%, #eef5ff 100%);border-top:1px solid #ebf1fb;border-bottom:1px solid #ebf1fb}

.section-head{max-width:860px;margin-bottom:28px}

.section-sub{color:var(--muted);margin-top:-4px;font-size:17px}

.grid-4,.grid-3,.grid-2,.gallery,.steps,.contact-wrap{display:grid;gap:22px}

.grid-4{grid-template-columns:repeat(4,1fr)}

.grid-3{grid-template-columns:repeat(3,1fr)}

.grid-2{grid-template-columns:repeat(2,1fr)}

.gallery{grid-template-columns:repeat(4,1fr)}

.steps{grid-template-columns:repeat(4,1fr)}

.contact-wrap{grid-template-columns:1.02fr .98fr}

.card,.step,.contact-panel,.gallery-item,.promise,.cta-band{

  background:#fff;border:1px solid var(--border);border-radius:var(--radius);

  padding:24px;box-shadow:0 10px 24px rgba(16,58,116,.07);

}

.mini-title{font-size:16px;font-weight:700;color:var(--blue3);margin-bottom:6px}

.muted{color:var(--muted)}

.strongline{font-size:19px;font-weight:700;color:var(--blue3)}

.list-check{list-style:none;padding:0;margin:0}

.list-check li{position:relative;padding:10px 0 10px 30px;border-bottom:1px solid var(--border)}

.list-check li:last-child{border-bottom:none}

.list-check li:before{content:"✓";position:absolute;left:0;top:10px;color:#154d9c;font-weight:700}

.gallery-item{padding:12px;overflow:hidden}

.gallery-item img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:16px;border:1px solid #dbe6f4}

.promise{

  background:linear-gradient(135deg,#123f7e,#195fc3);

  color:#fff;border:none;padding:38px;border-radius:30px;

}

.promise h2,.promise h3{color:#fff}

.pills{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}

.pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px}

.step-num{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#154d9c,#2c72d4);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:14px}

.cta-band{

  background:linear-gradient(135deg,#154d9c,#103a74);

  color:#fff;border:none;border-radius:32px;padding:42px;box-shadow:var(--shadow)

}

.cta-band h2,.cta-band .strongline{color:#fff}

.footer{background:#101722;color:#fff;padding:28px 0;font-size:14px;margin-top:10px}

</style>

</head>

<body>
